<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Volca FM Prototype</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="fm-prototype.css" />
</head>
<body>

<div class="app-shell">

  <!-- TOPBAR (zelfde stijl als drum) -->
  <div class="card topbar">
    <div>
      <h1>Volca FM Prototype</h1>
      <p class="sub">
        Twee modi: Step en Live. In Step programmeer je noten per step (max 3 per kolom).
        In Live speel je via het toetsenbord zonder direct steps te wijzigen.
      </p>
    </div>

    <div class="top-actions">
      <button id="playBtn" class="accent">Play</button>
      <button id="stopBtn">Stop</button>
      <button id="clearBtn">Clear</button>
      <button id="saveBtn">Save</button>
      <button id="loadBtn">Load</button>
    </div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="panel-row">
    <div class="card controls">

      <div class="field">
        <label>Mode</label>
        <select id="modeSelect">
          <option value="step">Step</option>
          <option value="live">Live</option>
        </select>
      </div>

      <div class="field small">
        <label>BPM</label>
        <input id="tempoInput" type="number" value="132" />
      </div>

      <div class="field small">
        <label>Steps</label>
        <select id="stepCountSelect">
          <option>8</option>
          <option selected>16</option>
          <option>32</option>
        </select>
      </div>

      <div class="field small">
        <label>Gate %</label>
        <input id="gateInput" type="number" value="70" />
      </div>

      <div class="field small">
        <label>Octaaf</label>
        <select id="octaveShift">
          <option value="-12">-1</option>
          <option value="0" selected>0</option>
          <option value="12">+1</option>
        </select>
      </div>

    </div>

    <div class="card midi-panel">

      <div class="field">
        <label>MIDI</label>
        <input type="checkbox" id="midiEnable" checked />
      </div>

      <div class="field">
        <label>Output</label>
        <select id="midiOutputSelect"></select>
      </div>

      <div class="field small">
        <label>Kanaal</label>
        <select id="midiChannelSelect"></select>
      </div>

      <div class="hint-line" id="modeHint"></div>

    </div>
  </div>

  <!-- STATUS -->
  <div class="card status-bar">
    <div id="statusText">Klaar</div>
    <div id="cursorInfo"></div>
  </div>

  <!-- SEQUENCER -->
  <div class="card sequencer-wrap">
    <div id="gridHeader" class="grid-header"></div>

    <div class="grid-wrap">
      <div id="noteLabels" class="note-labels"></div>
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <!-- LIVE PIANO -->
  <div class="card piano-wrap">
    <div class="piano-title">Live Keyboard</div>

    <div id="piano" class="piano"></div>

    <div class="keyboard-help">
      Gebruik toetsenbord (Z-M / Q-U) of klik op toetsen
    </div>
  </div>

</div>

<script src="fm-prototype.js"></script>
</body>
</html>
